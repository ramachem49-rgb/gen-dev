  version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: learning_platform_mongodb
    restart: always
    command: mongod --auth --bind_ip_all --port 27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: learning_platform
    volumes:
      - ./database/mongodb/data:/data/db
      - ./database/mongodb/config:/etc/mongo
      - ./database/mongodb/backups:/backups
    networks:
      - database_network
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: learning_platform_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - ./database/redis/data:/data
      - ./database/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - database_network
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  database_network:
    driver: bridge
    internal: true  # Internal network only accessible by server