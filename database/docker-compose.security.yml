version: '3.8'

services:
  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: learning_platform_fail2ban
    restart: always
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./security/fail2ban/data:/data
      - ./security/fail2ban/jail.local:/etc/fail2ban/jail.local
      - ./server/logs:/var/log/nginx:ro
    environment:
      - TZ=Asia/Phnom_Penh
      - F2B_DB_PURGE_AGE=30d

  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: learning_platform_waf
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./security/waf/nginx.conf:/etc/nginx/nginx.conf
      - ./security/waf/modsecurity.conf:/etc/modsecurity/modsecurity.conf
      - ./security/ssl:/etc/nginx/ssl
    environment:
      - PARANOIA=4
      - BACKEND=http://server:5000
    depends_on:
      - server
    networks:
      - web_network
      - backend_network

  server:
    build: ./server
    container_name: learning_platform_server
    restart: always
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/learning_platform?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./server/logs:/app/logs
      - ./security/keys:/app/security/keys:ro
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network
      - database_network

networks:
  web_network:
    driver: bridge
  backend_network:
    driver: bridge
    internal: true
  database_network:
    external: true
    name: learning_platform_database_network